name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Минимальные права токена Actions: только чтение репо.
# Если позже появятся deploy-джобы (OIDC/gh-pages/…) — права поднимем точечно в них.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck (client)
        run: npm run typecheck

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Build (client)
        run: npm run build

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Полная история: gitleaks проверит и прошлые коммиты.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
